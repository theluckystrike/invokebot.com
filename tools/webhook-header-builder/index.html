<body>
    <div class="container">
        <header>
            <h1>Webhook Header Builder</h1>
            <p class="subtitle">Build custom HTTP headers and generate code snippets</p>
        </header>

        <div class="tool-section">
            <label for="webhookUrl">Webhook URL</label>
            <input type="text" id="webhookUrl" placeholder="https://example.com/webhook" value="https://example.com/webhook">

            <label for="httpMethod">HTTP Method</label>
            <select id="httpMethod">
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
            </select>

            <label>Preset Headers</label>
            <div class="preset-section">
                <div class="preset-label">Quick add popular headers:</div>
                <button class="preset-btn" onclick="addPresetHeader('Authorization', 'Bearer YOUR_TOKEN')">Bearer Token</button>
                <button class="preset-btn" onclick="addPresetHeader('X-API-Key', 'YOUR_API_KEY')">API Key</button>
                <button class="preset-btn" onclick="addPresetHeader('Content-Type', 'application/json')">JSON</button>
                <button class="preset-btn" onclick="addPresetHeader('X-Webhook-Secret', 'YOUR_SECRET')">Webhook Secret</button>
                <button class="preset-btn" onclick="addPresetHeader('User-Agent', 'webhook-client/1.0')">User-Agent</button>
            </div>

            <label>Custom Headers</label>
            <div id="headersContainer"></div>

            <div class="button-group">
                <button onclick="addHeader()">+ Add Header</button>
                <button onclick="generateOutput()">Generate Code</button>
            </div>

            <div id="results" class="results">
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 invokebot.com. All rights reserved.</p>
    </footer>

    <script>
        let headerCount = 0;

        function addHeader() {
            headerCount++;
            const container = document.getElementById('headersContainer');
            const html = `
                <div class="header-item" id="header-${headerCount}">
                    <input type="text" placeholder="Header Name" class="header-name" value="">
                    <input type="text" placeholder="Header Value" class="header-value" value="">
                    <button class="remove-btn" onclick="removeHeader(${headerCount})">Remove</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addPresetHeader(name, value) {
            headerCount++;
            const container = document.getElementById('headersContainer');
            const html = `
                <div class="header-item" id="header-${headerCount}">
                    <input type="text" placeholder="Header Name" class="header-name" value="${name}">
                    <input type="text" placeholder="Header Value" class="header-value" value="${value}">
                    <button class="remove-btn" onclick="removeHeader(${headerCount})">Remove</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function removeHeader(id) {
            const element = document.getElementById(`header-${id}`);
            if (element) element.remove();
        }

        function generateOutput() {
            const url = document.getElementById('webhookUrl').value.trim();
            const method = document.getElementById('httpMethod').value;
            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultsContent');

            if (!url) {
                contentDiv.innerHTML = '<div style="color: #f56565;">Please enter a webhook URL</div>';
                resultsDiv.classList.add('show');
                return;
            }

            const headers = [];
            document.querySelectorAll('.header-item').forEach(item => {
                const name = item.querySelector('.header-name').value.trim();
                const value = item.querySelector('.header-value').value.trim();
                if (name && value) {
                    headers.push({ name, value });
                }
            });

            let html = '<div class="success">✓ Headers configured</div>';

            // cURL command
            let curlCmd = `curl -X ${method} "${url}"`;
            headers.forEach(h => {
                curlCmd += ` \\\n  -H "${h.name}: ${h.value}"`;
            });
            curlCmd += ` \\\n  -d '{"event": "webhook"}'`;

            html += `
                <div class="result-section">
                    <div class="result-title">cURL Command</div>
                    <div class="code-block">
                        ${curlCmd.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                </div>
            `;

            // JavaScript Fetch
            const fetchCode = `const headers = {
${headers.map(h => `  '${h.name}': '${h.value}'`).join(',\n')}
};

fetch('${url}', {
  method: '${method}',
  headers: headers,
  body: JSON.stringify({ event: 'webhook' })
})
.then(response => response.json())
.then(data => console.log(data));`;

            html += `
                <div class="result-section">
                    <div class="result-title">JavaScript (Fetch API)</div>
                    <div class="code-block">
                        <pre>${fetchCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                </div>
            `;

            // Python Requests
            const pythonCode = `import requests

headers = {
${headers.map(h => `    '${h.name}': '${h.value}'`).join(',\n')}
}

response = requests.${method.toLowerCase()}(
    '${url}',
    headers=headers,
    json={'event': 'webhook'}
)
print(response.json())`;

            html += `
                <div class="result-section">
                    <div class="result-title">Python (Requests)</div>
                    <div class="code-block">
                        <pre>${pythonCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                </div>
            `;

            // Node.js/Axios
            const axiosCode = `const axios = require('axios');

const headers = {
${headers.map(h => `  '${h.name}': '${h.value}'`).join(',\n')}
};

axios.${method.toLowerCase()}('${url}',
  { event: 'webhook' },
  { headers }
)
.then(response => console.log(response.data))
.catch(error => console.error(error));`;

            html += `
                <div class="result-section">
                    <div class="result-title">Node.js (Axios)</div>
                    <div class="code-block">
                        <pre>${axiosCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                </div>
            `;

            // Headers JSON
            const headersJson = JSON.stringify(
                Object.fromEntries(headers.map(h => [h.name, h.value])),
                null,
                2
            );

            html += `
                <div class="result-section">
                    <div class="result-title">Headers JSON</div>
                    <div class="code-block">
                        <pre>${headersJson.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                </div>
            `;

            contentDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        function copyCode(button) {
            const codeBlock = button.previousElementSibling;
            const text = codeBlock.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerText;
                button.innerText = 'Copied!';
                setTimeout(() => {
                    button.innerText = originalText;
                }, 2000);
            });
        }

        // Initialize with one empty header
        addHeader();
    </script>
