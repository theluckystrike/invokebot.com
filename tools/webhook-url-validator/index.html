<body>
    <div class="container">
        <header>
            <h1>Webhook URL Validator</h1>
            <p class="subtitle">Validate, test, and debug webhook URLs instantly</p>
        </header>

        <div class="tool-section">
            <div class="tabs">
                <button class="tab-btn active" data-tab="validate">Validate</button>
                <button class="tab-btn" data-tab="test">Test</button>
            </div>

            <div id="validate" class="tab-content active">
                <label for="webhookUrl">Webhook URL</label>
                <input type="text" id="webhookUrl" placeholder="https://example.com/webhook">

                <button onclick="validateWebhook()">Validate URL</button>

                <div id="validateResults" class="results">
                    <div id="validateContent"></div>
                </div>
            </div>

            <div id="test" class="tab-content">
                <label for="testUrl">Webhook URL</label>
                <input type="text" id="testUrl" placeholder="https://example.com/webhook">

                <label for="payload">JSON Payload (Optional)</label>
                <textarea id="payload" placeholder='{"event": "test", "timestamp": 1234567890}'>{
  "event": "test",
  "timestamp": 1234567890,
  "data": {
    "message": "Webhook test payload"
  }
}</textarea>

                <label for="method">HTTP Method</label>
                <select id="method" style="padding: 12px; background: #0a0e27; border: 1px solid #1e2749; border-radius: 6px; color: #e0e6ed; margin-bottom: 16px;">
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="PATCH">PATCH</option>
                </select>

                <button onclick="testWebhook()">Send Test Webhook</button>

                <div id="testResults" class="results">
                    <div id="testContent"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 invokebot.com. All rights reserved.</p>
    </footer>

    <script>
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        function validateWebhook() {
            const url = document.getElementById('webhookUrl').value.trim();
            const resultsDiv = document.getElementById('validateResults');
            const contentDiv = document.getElementById('validateContent');

            if (!url) {
                contentDiv.innerHTML = '<div class="error">Please enter a webhook URL</div>';
                resultsDiv.classList.add('show');
                return;
            }

            let html = '';

            try {
                const urlObj = new URL(url);
                html += '<div class="result-item"><div class="result-label">URL Format</div><div class="result-value status-pass">✓ Valid URL format</div></div>';

                const protocol = urlObj.protocol;
                const isHttps = protocol === 'https:';
                const protocolStatus = isHttps ? 'status-pass' : 'status-warning';
                const protocolMsg = isHttps ? '✓ HTTPS (Recommended)' : '⚠ HTTP (Not recommended for webhooks)';
                html += `<div class="result-item"><div class="result-label">Protocol</div><div class="result-value ${protocolStatus}">${protocolMsg}</div></div>`;

                const hostname = urlObj.hostname;
                const isLocalhost = hostname === 'localhost' || hostname.startsWith('127.');
                const hostnameStatus = isLocalhost ? 'status-warning' : 'status-pass';
                html += `<div class="result-item"><div class="result-label">Hostname</div><div class="result-value ${hostnameStatus}">${hostname}</div></div>`;

                const port = urlObj.port;
                const portText = port ? `Port ${port}` : 'Default port';
                html += `<div class="result-item"><div class="result-label">Port</div><div class="result-value">${portText}</div></div>`;

                const pathname = urlObj.pathname;
                html += `<div class="result-item"><div class="result-label">Path</div><div class="result-value">${pathname || '/'}</div></div>`;

                const hasQuery = urlObj.search.length > 0;
                html += `<div class="result-item"><div class="result-label">Query Parameters</div><div class="result-value">${hasQuery ? urlObj.search : 'None'}</div></div>`;

                html += '<div class="result-item success" style="border-left: 4px solid #48bb78; background: rgba(72, 187, 120, 0.1);">✓ URL is valid and ready to receive webhooks</div>';

            } catch (e) {
                html = `<div class="error">✗ Invalid URL format: ${e.message}</div>`;
            }

            contentDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        function testWebhook() {
            const url = document.getElementById('testUrl').value.trim();
            const payload = document.getElementById('payload').value.trim();
            const method = document.getElementById('method').value;
            const resultsDiv = document.getElementById('testResults');
            const contentDiv = document.getElementById('testContent');

            if (!url) {
                contentDiv.innerHTML = '<div class="error">Please enter a webhook URL</div>';
                resultsDiv.classList.add('show');
                return;
            }

            contentDiv.innerHTML = '<div class="result-item">Testing webhook...</div>';
            resultsDiv.classList.add('show');

            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                if (payload) {
                    try {
                        JSON.parse(payload);
                        options.body = payload;
                    } catch {
                        contentDiv.innerHTML = '<div class="error">Invalid JSON payload</div>';
                        return;
                    }
                }

                fetch(url, options)
                    .then(response => {
                        let html = `<div class="result-item"><div class="result-label">Status Code</div><div class="result-value status-${response.ok ? 'pass' : 'fail'}">${response.status} ${response.statusText}</div></div>`;

                        html += '<div class="result-item"><div class="result-label">Response Headers</div><div class="result-value"><pre style="overflow-x: auto; background: #0a0e27; padding: 10px; border-radius: 4px;">';

                        const importantHeaders = ['content-type', 'content-length', 'server', 'x-ratelimit-limit', 'x-ratelimit-remaining'];
                        importantHeaders.forEach(header => {
                            const value = response.headers.get(header);
                            if (value) {
                                html += `${header}: ${value}\n`;
                            }
                        });

                        html += '</pre></div></div>';

                        html += response.ok ? '<div class="result-item success">✓ Webhook test sent successfully</div>' : '<div class="error">✗ Server returned error status</div>';

                        contentDiv.innerHTML = html;
                    })
                    .catch(error => {
                        contentDiv.innerHTML = `<div class="error">✗ CORS or network error: ${error.message}</div><div class="result-item"><div class="result-value" style="color: #cbd5e0;">Note: Some webhooks may not be testable from a browser due to CORS restrictions. This is expected behavior. Your webhook URL is still valid.</div></div>`;
                    });
            } catch (e) {
                contentDiv.innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }
    </script>
