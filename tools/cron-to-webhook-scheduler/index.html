<body>
    <div class="container">
        <header>
            <h1>Cron to Webhook Scheduler</h1>
            <p class="subtitle">Convert cron expressions to schedules instantly</p>
        </header>

        <div class="tool-section">
            <label for="cronInput">Cron Expression</label>
            <input type="text" id="cronInput" placeholder="0 9 * * MON-FRI" value="0 9 * * MON-FRI">

            <label>Quick Presets</label>
            <div style="margin-bottom: 20px;">
                <button class="preset-btn" onclick="setCron('0 * * * *')">Every Hour</button>
                <button class="preset-btn" onclick="setCron('0 0 * * *')">Daily at Midnight</button>
                <button class="preset-btn" onclick="setCron('0 9 * * MON-FRI')">Weekdays 9 AM</button>
                <button class="preset-btn" onclick="setCron('0 0 * * 0')">Weekly on Sunday</button>
                <button class="preset-btn" onclick="setCron('0 0 1 * *')">Monthly 1st</button>
                <button class="preset-btn" onclick="setCron('*/15 * * * *')">Every 15 Minutes</button>
            </div>

            <label for="timezone">Timezone</label>
            <input type="text" id="timezone" placeholder="UTC" value="UTC" style="margin-bottom: 20px;">

            <button onclick="parseCron()">Parse Cron Expression</button>

            <div id="results" class="results">
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script>
        function setCron(expr) {
            document.getElementById('cronInput').value = expr;
            parseCron();
        }

        function getNextExecutionTimes(cronExpr, count = 10) {
            const parts = cronExpr.trim().split(/\s+/);
            if (parts.length !== 5) {
                throw new Error('Invalid cron format. Expected: minute hour day month dayOfWeek');
            }

            const [minute, hour, day, month, dayOfWeek] = parts;
            const times = [];
            let current = new Date();

            for (let i = 0; i < count * 10; i++) {
                current = new Date(current.getTime() + 60000);

                if (matchesCron(current, minute, hour, day, month, dayOfWeek)) {
                    times.push(new Date(current));
                    if (times.length === count) break;
                }
            }

            return times;
        }

        function matchesCron(date, minute, hour, day, month, dayOfWeek) {
            const m = date.getMinutes();
            const h = date.getHours();
            const d = date.getDate();
            const mo = date.getMonth() + 1;
            const dw = date.getDay();

            if (!matchesCronPart(m, minute, 0, 59)) return false;
            if (!matchesCronPart(h, hour, 0, 23)) return false;
            if (!matchesCronPart(d, day, 1, 31)) return false;
            if (!matchesCronPart(mo, month, 1, 12)) return false;

            const dayMatch = dayOfWeek === '?' || dayOfWeek === '*' || matchesCronPart(dw, dayOfWeek, 0, 6);
            const dateMatch = day === '?' || day === '*' || matchesCronPart(d, day, 1, 31);

            return (dayMatch || dateMatch) && matchesCronPart(mo, month, 1, 12);
        }

        function matchesCronPart(value, part, min, max) {
            if (part === '*' || part === '?') return true;

            if (part.includes(',')) {
                return part.split(',').some(p => matchesCronPart(value, p, min, max));
            }

            if (part.includes('-')) {
                const [start, end] = part.split('-').map(p => parseSpecialDay(p));
                return value >= parseInt(start) && value <= parseInt(end);
            }

            if (part.includes('/')) {
                const [base, step] = part.split('/');
                const baseVal = base === '*' ? min : parseInt(base);
                return (value - baseVal) % parseInt(step) === 0 && value >= baseVal;
            }

            const dayMap = { 'SUN': 0, 'MON': 1, 'TUE': 2, 'WED': 3, 'THU': 4, 'FRI': 5, 'SAT': 6 };
            const mappedPart = dayMap[part] !== undefined ? dayMap[part] : parseInt(part);

            return value === mappedPart;
        }

        function parseSpecialDay(str) {
            const dayMap = { 'SUN': 0, 'MON': 1, 'TUE': 2, 'WED': 3, 'THU': 4, 'FRI': 5, 'SAT': 6 };
            return dayMap[str] !== undefined ? dayMap[str] : str;
        }

        function describeCron(cronExpr) {
            const parts = cronExpr.trim().split(/\s+/);
            const [minute, hour, day, month, dayOfWeek] = parts;

            let desc = '';

            if (minute === '*/15') desc += 'Every 15 minutes';
            else if (minute === '*/30') desc += 'Every 30 minutes';
            else if (minute === '0') {
                if (hour === '*') desc += 'Every hour';
                else if (hour === '0') desc += 'Daily at midnight';
                else desc += `Every day at ${hour}:00`;
            } else desc += `At ${minute} minutes past the hour`;

            if (dayOfWeek !== '*' && dayOfWeek !== '?') {
                desc += ` on ${dayOfWeek}`;
            }

            return desc;
        }

        function parseCron() {
            const cronExpr = document.getElementById('cronInput').value.trim();
            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultsContent');

            if (!cronExpr) {
                contentDiv.innerHTML = '<div class="error">Please enter a cron expression</div>';
                resultsDiv.classList.add('show');
                return;
            }

            try {
                const description = describeCron(cronExpr);
                const times = getNextExecutionTimes(cronExpr, 10);

                let html = `<div class="success">✓ Valid cron expression</div>`;
                html += `<div class="result-item"><div class="result-label">Description</div><div class="result-value">${description}</div></div>`;

                html += `<div class="result-item"><div class="result-label">Next 10 Execution Times</div><div class="result-value">`;
                times.forEach((time, idx) => {
                    const formatted = time.toLocaleString('en-US', {
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    html += `<div class="execution-time">${idx + 1}. ${formatted}</div>`;
                });
                html += `</div></div>`;

                const webhookConfig = {
                    schedule: cronExpr,
                    description: description,
                    timezone: document.getElementById('timezone').value || 'UTC',
                    nextExecutions: times.slice(0, 3).map(t => t.toISOString())
                };

                html += `<div class="result-item"><div class="result-label">Webhook Configuration (JSON)</div><div class="code-block"><code>${JSON.stringify(webhookConfig, null, 2)}</code></div></div>`;

                contentDiv.innerHTML = html;

            } catch (e) {
                contentDiv.innerHTML = `<div class="error">✗ Invalid cron expression: ${e.message}</div><div class="result-item"><div class="result-value">Format: minute hour day month dayOfWeek (e.g., 0 9 * * MON-FRI)</div></div>`;
            }

            resultsDiv.classList.add('show');
        }

        document.getElementById('cronInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') parseCron();
        });
    </script>
