<body>
    <div class="container">
        <header>
            <h1>API Rate Limit Calculator</h1>
            <p class="subtitle">Calculate rate limits, quotas, and burst capacity</p>
        </header>

        <div class="tool-section">
            <div class="input-grid">
                <div>
                    <label for="requestsPerSecond">Requests Per Second (RPS)</label>
                    <input type="number" id="requestsPerSecond" placeholder="100" value="100" min="1">
                </div>
                <div>
                    <label for="burstWindow">Burst Window (Seconds)</label>
                    <input type="number" id="burstWindow" placeholder="60" value="60" min="1">
                </div>
                <div>
                    <label for="avgPayloadSize">Avg Payload Size (KB)</label>
                    <input type="number" id="avgPayloadSize" placeholder="10" value="10" min="1">
                </div>
                <div>
                    <label for="parallelRequests">Max Parallel Requests</label>
                    <input type="number" id="parallelRequests" placeholder="10" value="10" min="1">
                </div>
            </div>

            <button onclick="calculateLimits()">Calculate Limits</button>

            <div id="results" class="results">
                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 invokebot.com. All rights reserved.</p>
    </footer>

    <script>
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(2) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(2) + 'K';
            }
            return num.toLocaleString();
        }

        function calculateLimits() {
            const rps = parseFloat(document.getElementById('requestsPerSecond').value);
            const burstWindow = parseFloat(document.getElementById('burstWindow').value);
            const payloadSize = parseFloat(document.getElementById('avgPayloadSize').value);
            const parallelRequests = parseFloat(document.getElementById('parallelRequests').value);

            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultsContent');

            if (!rps || rps <= 0 || !burstWindow || burstWindow <= 0) {
                contentDiv.innerHTML = '<div class="error">Please enter valid positive numbers</div>';
                resultsDiv.classList.add('show');
                return;
            }

            // Calculate limits
            const burstCapacity = rps * burstWindow;
            const requestsPerMinute = rps * 60;
            const requestsPerHour = rps * 3600;
            const requestsPerDay = rps * 86400;
            const requestsPerMonth = requestsPerDay * 30;

            const bandwidthPerSecond = rps * payloadSize;
            const bandwidthPerDay = bandwidthPerSecond * 86400;
            const bandwidthPerMonth = bandwidthPerDay * 30;

            const maxConcurrentBandwidth = parallelRequests * payloadSize;

            // Build results
            let html = `
                <div class="result-grid">
                    <div class="result-card">
                        <div class="result-label">Burst Capacity</div>
                        <div class="result-value">${formatNumber(burstCapacity)}</div>
                        <div class="result-unit">requests in ${burstWindow}s</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Requests/Minute</div>
                        <div class="result-value">${formatNumber(requestsPerMinute)}</div>
                        <div class="result-unit">sustainable rate</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Requests/Hour</div>
                        <div class="result-value">${formatNumber(requestsPerHour)}</div>
                        <div class="result-unit">hourly quota</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Requests/Day</div>
                        <div class="result-value">${formatNumber(requestsPerDay)}</div>
                        <div class="result-unit">daily quota</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Requests/Month</div>
                        <div class="result-value">${formatNumber(requestsPerMonth)}</div>
                        <div class="result-unit">monthly quota</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Bandwidth/Second</div>
                        <div class="result-value">${bandwidthPerSecond.toFixed(0)}</div>
                        <div class="result-unit">KB/s throughput</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Bandwidth/Day</div>
                        <div class="result-value">${formatNumber(bandwidthPerDay)}</div>
                        <div class="result-unit">KB transferred</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Max Concurrent Bandwidth</div>
                        <div class="result-value">${formatNumber(maxConcurrentBandwidth)}</div>
                        <div class="result-unit">KB at peak</div>
                    </div>
                </div>
            `;

            // Recommendations
            html += `
                <div class="recommendations">
                    <h3>Rate Limiting Strategies</h3>
                    <div class="strategy-box">
                        <div class="strategy-title">Token Bucket Algorithm</div>
                        Capacity: ${burstCapacity} tokens, Refill rate: ${rps} tokens/sec. Best for variable request rates with controlled bursts.
                    </div>
                    <div class="strategy-box">
                        <div class="strategy-title">Sliding Window Log</div>
                        Allow requests if within the last 60 seconds < ${requestsPerMinute} requests. Best for exact quota enforcement.
                    </div>
                    <div class="strategy-box">
                        <div class="strategy-title">Fixed Window Counter</div>
                        Reset counter every ${Math.ceil(requestsPerHour / 60)} minutes, limit: ${requestsPerMinute} requests. Simple but less precise.
                    </div>
                    <div class="strategy-box">
                        <div class="strategy-title">Leaky Bucket Algorithm</div>
                        Queue capacity: ${burstCapacity}, Drain rate: ${rps} req/sec. Best for smooth rate enforcement.
                    </div>
                </div>
            `;

            // Recommendations section
            html += `
                <div class="recommendations">
                    <h3>Recommended Configuration</h3>
            `;

            const avgRequestTime = (1 / rps).toFixed(3);
            const recommendedTimeout = Math.max(5, Math.ceil(burstWindow / 2));

            html += `
                    <div class="recommendation-item">
                        <strong>Timeout:</strong> ${recommendedTimeout}s per request (avg processing time: ${avgRequestTime}s)
                    </div>
                    <div class="recommendation-item">
                        <strong>Retry Policy:</strong> Exponential backoff with max ${Math.ceil(requestsPerMinute / 10)} retries
                    </div>
                    <div class="recommendation-item">
                        <strong>Concurrent Connections:</strong> Keep below ${Math.ceil(parallelRequests * 1.5)} for safety margin
                    </div>
                    <div class="recommendation-item">
                        <strong>Queue Strategy:</strong> Use token bucket for ${rps} RPS with ${burstCapacity} token capacity
                    </div>
                    <div class="recommendation-item">
                        <strong>Monitoring Threshold:</strong> Alert if 80% of monthly quota (${formatNumber(requestsPerMonth * 0.8)}) is reached
                    </div>
                    <div class="recommendation-item">
                        <strong>Bandwidth Monitoring:</strong> Alert if ${Math.ceil(bandwidthPerDay / 10)} KB/day usage observed
                    </div>
                </div>
            `;

            contentDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        // Calculate on Enter
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateLimits();
            });
        });
    </script>
