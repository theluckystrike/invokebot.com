<div class="container">

    </div>
    <div style="color:#64748b; font-size:0.8rem;">invokebot.com</div>

  <div class="tool-grid">
    <!-- LEFT: Schema input + builder -->
    <div class="card">
      <div class="card-header">
        <h2>📐 Schema</h2>
        <div class="preset-group">
          <button class="preset-btn" data-preset="stripe">Stripe</button>
          <button class="preset-btn" data-preset="github">GitHub</button>

          <button class="preset-btn" data-preset="custom">Custom</button>
        </div>
      </div>
      <textarea id="schemaInput" rows="6" placeholder='Paste JSON Schema here...' spellcheck="false">{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "type": "object",
  "required": ["event", "data"],
  "properties": {
    "event": { "type": "string" },
    "data": { "type": "object", "required": ["id"], "properties": { "id": { "type": "integer" } } }
  }
}</textarea>
      
      <div class="flex-between mt-1">

          </select>
          <label><input type="checkbox" class="field-required" checked> required</label>
          <input type="text" class="field-desc" placeholder="description (optional)" value="Event type">
        </div>
        <div class="builder-row">
          <input type="text" class="field-name" placeholder="field name" value="data">
          <select class="field-type"><option value="object">object</option><option value="string">string</option><option value="integer">integer</option></select>
          <label><input type="checkbox" class="field-required" checked> required</label>
          <input type="text" class="field-desc" placeholder="description" value="Payload data">
        </div>
        <div class="builder-row">
          <input type="text" class="field-name" placeholder="field name" value="timestamp">
          <select class="field-type"><option value="string">string</option><option value="integer">integer</option></select>
          <label><input type="checkbox" class="field-required"> required</label>
          <input type="text" class="field-desc" placeholder="description" value="ISO timestamp">
        </div>
      </div>
      <div class="generated-schema" id="generatedSchemaPreview">Generated schema will appear here</div>

    <!-- RIGHT: Payload input + validation -->
    <div class="card">
      <div class="card-header">
        <h2>📦 Payload</h2>
        <span style="font-size:0.75rem; color:#94a3b8;">paste JSON</span>
      </div>

  "event": "payment_intent.succeeded",
  "data": { "id": 12345 }
}</textarea>
      <div class="action-bar">
        <button class="btn-primary" id="validateBtn">✅ Validate</button>
        <button class="btn-secondary" id="clearBtn">Clear</button>
        <span id="statusBadge" class="status-badge" style="opacity:0;">Ready</span>
      </div>
      <div id="errorContainer" class="error-list" style="display:none;"></div>
      <div id="lineHighlightContainer" style="margin-top:0.5rem; font-size:0.75rem; color:#94a3b8; max-height:150px; overflow-y:auto; background:#0f172a; border-radius:0.5rem; padding:0.4rem; border:1px solid #334155; white-space:pre-wrap; font-family:monospace;"></div>
    </div>

<script>
  (function() {
    // DOM refs
    const schemaInput = document.getElementById('schemaInput');
    const payloadInput = document.getElementById('payloadInput');
    const validateBtn = document.getElementById('validateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBadge = document.getElementById('statusBadge');
    const errorContainer = document.getElementById('errorContainer');
    const lineHighlightContainer = document.getElementById('lineHighlightContainer');
    const generateSchemaBtn = document.getElementById('generateSchemaBtn');
    const generatedPreview = document.getElementById('generatedSchemaPreview');

    // Presets
    const presets = {
      stripe: {
        schema: JSON.stringify({ "$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "required": ["id", "object", "type"], "properties": { "id": { "type": "string" }, "object": { "type": "string" }, "type": { "type": "string" }, "data": { "type": "object", "properties": { "object": { "type": "object" } } } } }, null, 2),
        payload: JSON.stringify({ "id": "evt_123", "object": "event", "type": "payment_intent.succeeded", "data": { "object": { "id": "pi_456" } } }, null, 2)
      },
      github: {
        schema: JSON.stringify({ "$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "required": ["action", "repository"], "properties": { "action": { "type": "string" }, "repository": { "type": "object", "required": ["id", "name"], "properties": { "id": { "type": "integer" }, "name": { "type": "string" } } } } }, null, 2),
        payload: JSON.stringify({ "action": "opened", "repository": { "id": 123, "name": "my-repo" } }, null, 2)
      },
      slack: {
        schema: JSON.stringify({ "$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "required": ["token", "team_id", "event"], "properties": { "token": { "type": "string" }, "team_id": { "type": "string" }, "event": { "type": "object", "required": ["type"], "properties": { "type": { "type": "string" } } } } }, null, 2),
        payload: JSON.stringify({ "token": "xxyyzz", "team_id": "T001", "event": { "type": "message" } }, null, 2)
      },
      custom: {
        schema: JSON.stringify({ "$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "required": ["event", "data"], "properties": { "event": { "type": "string" }, "data": { "type": "object", "required": ["id"], "properties": { "id": { "type": "integer" } } } } }, null, 2),
        payload: JSON.stringify({ "event": "test", "data": { "id": 1 } }, null, 2)
      }
    };

    // Load preset
    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', function() {
        const key = this.dataset.preset;
        if (presets[key]) {
          schemaInput.value = presets[key].schema;
          payloadInput.value = presets[key].payload;
          clearValidation();
        }
      });
    });

    // Clear
    clearBtn.addEventListener('click', function() {
      payloadInput.value = '';
      schemaInput.value = '';
      clearValidation();
    });

    function clearValidation() {
      statusBadge.style.opacity = '0';
      statusBadge.className = 'status-badge';
      errorContainer.style.display = 'none';
      errorContainer.innerHTML = '';
      lineHighlightContainer.innerHTML = '';
    }

    // Generate schema from builder
    generateSchemaBtn.addEventListener('click', function() {
      const rows = document.querySelectorAll('#schemaBuilder .builder-row');
      const properties = {};
      const required = [];
      rows.forEach(row => {
        const name = row.querySelector('.field-name').value.trim();
        if (!name) return;
        const type = row.querySelector('.field-type').value;
        const isRequired = row.querySelector('.field-required').checked;
        const desc = row.querySelector('.field-desc').value.trim();
        const prop = { type: type };
        if (desc) prop.description = desc;
        properties[name] = prop;
        if (isRequired) required.push(name);
      });
      const schema = {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "type": "object",
        "required": required,
        "properties": properties
      };
      const schemaStr = JSON.stringify(schema, null, 2);
      schemaInput.value = schemaStr;
      generatedPreview.textContent = '✅ Schema generated. You can edit manually.';
      clearValidation();
    });

    // Validation engine (simple draft-07 subset)
    function validateAgainstSchema(schema, data, path = '$') {
      const errors = [];
      if (typeof schema !== 'object' || schema === null) return errors;

      // type check
      if (schema.type) {
        const typeMap = { 'string': 'string', 'integer': 'number', 'number': 'number', 'boolean': 'boolean', 'object': 'object', 'array': 'array' };
        const expectedType = schema.type;
        let actualType = typeof data;
        if (actualType === 'number' && schema.type === 'integer') {
          if (!Number.isInteger(data)) {
            errors.push({ path, message: `Expected integer, got number (${data})` });
          }
        } else if (expectedType === 'array' && !Array.isArray(data)) {
          errors.push({ path, message: `Expected array, got ${actualType}` });
        } else if (expectedType !== 'array' && actualType !== expectedType && !(expectedType === 'integer' && actualType === 'number')) {
          if (expectedType === 'integer' && actualType === 'number') { /* ok */ }
          else if (expectedType !== actualType) {
            errors.push({ path, message: `Expected ${expectedType}, got ${actualType}` });
          }
        }
      }

      // required
      if (schema.required && Array.isArray(schema.required) && typeof data === 'object' && !Array.isArray(data) && data !== null) {
        for (const req of schema.required) {
          if (!(req in data)) {
            errors.push({ path, message: `Missing required field '${req}'` });
          }
        }
      }

      // properties (object)
      if (schema.properties && typeof data === 'object' && !Array.isArray(data) && data !== null) {
        for (const [key, propSchema] of Object.entries(schema.properties)) {
          if (key in data) {
            const childPath = `${path}.${key}`;
            errors.push(...validateAgainstSchema(propSchema, data[key], childPath));
          }
        }
        // extra properties (additionalProperties: false by default)
        if (schema.additionalProperties === false) {
          const allowed = new Set(Object.keys(schema.properties));
          for (const key of Object.keys(data)) {
            if (!allowed.has(key)) {
              errors.push({ path: `${path}.${key}`, message: `Extra property '${key}' not allowed` });
            }
          }
        }
      }

      // items (array)
      if (schema.items && Array.isArray(data)) {
        data.forEach((item, idx) => {
          errors.push(...validateAgainstSchema(schema.items, item, `${path}[${idx}]`));
        });
      }

      return errors;
    }

    // Highlight errors in payload with line numbers
    function highlightErrors(payloadStr, errors) {
      if (!payloadStr) return '';
      const lines = payloadStr.split('\n');
      const errorPaths = new Set(errors.map(e => e.path));
      // simple line highlighting: mark lines that contain error path (approximate)
      let result = '';
      lines.forEach((line, idx) => {
        const lineNum = idx + 1;
        let highlight = false;
        for (const errPath of errorPaths) {
          // check if line includes the path key (rough)
          const lastKey = errPath.split('.').pop();
          if (lastKey && line.includes(lastKey) && (line.includes('"') || line.includes(':'))) {
            highlight = true;
            break;
          }
        }
        const prefix = highlight ? '🚫 ' : '   ';
        const cls = highlight ? 'line-highlight' : '';
        result += `<span class="${cls}">${prefix}${lineNum.toString().padStart(3, ' ')}: ${line}</span>\n`;
      });
      return result;
    }

    // Main validate
    validateBtn.addEventListener('click', function() {
      let schemaStr = schemaInput.value.trim();
      let payloadStr = payloadInput.value.trim();
      if (!schemaStr) { alert('Please enter a JSON Schema.'); return; }
      if (!payloadStr) { alert('Please enter a JSON payload.'); return; }

      let schema, payload;
      try {
        schema = JSON.parse(schemaStr);
      } catch (e) {
        alert('Invalid JSON Schema: ' + e.message);
        return;
      }
      try {
        payload = JSON.parse(payloadStr);
      } catch (e) {
        alert('Invalid JSON Payload: ' + e.message);
        return;
      }

      const errors = validateAgainstSchema(schema, payload);
      const isValid = errors.length === 0;

      // Status badge
      statusBadge.style.opacity = '1';
      statusBadge.className = 'status-badge ' + (isValid ? 'valid' : 'invalid');
      statusBadge.textContent = isValid ? '✅ VALID' : `❌ INVALID (${errors.length})`;

      // Error list
      errorContainer.style.display = 'block';
      if (isValid) {
        errorContainer.innerHTML = '<div style="color:#10b981;">✔ No validation errors.</div>';
      } else {
        let html = '';
        errors.forEach(err => {
          html += `<div class="error-item"><span class="error-path">${err.path}</span> <span class="error-msg">${err.message}</span></div>`;
        });
        errorContainer.innerHTML = html;
      }

      // Line highlights
      const highlighted = highlightErrors(payloadStr, errors);
      lineHighlightContainer.innerHTML = highlighted || 'No errors to highlight.';
    });

    // initial preset load (custom)
    document.querySelector('[data-preset="custom"]').click();

    // update generated preview on builder change
    function updateGeneratedPreview() {
      const rows = document.querySelectorAll('#schemaBuilder .builder-row');
      const properties = {};
      const required = [];
      rows.forEach(row => {
        const name = row.querySelector('.field-name').value.trim();
        if (!name) return;
        const type = row.querySelector('.field-type').value;
        const isRequired = row.querySelector('.field-required').checked;
        const desc = row.querySelector('.field-desc').value.trim();
        const prop = { type: type };
        if (desc) prop.description = desc;
        properties[name] = prop;
        if (isRequired) required.push(name);
      });
      const schema = { "$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "required": required, "properties": properties };
      generatedPreview.textContent = JSON.stringify(schema, null, 2);
    }
    document.querySelectorAll('#schemaBuilder input, #schemaBuilder select').forEach(el => {
      el.addEventListener('input', updateGeneratedPreview);
    });
    updateGeneratedPreview();
  })();
</script>
